components:
  ##
  #
  # SecuritySchemes
  #
  ##
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  ##
  #
  # Parameters
  #
  ##
  parameters:
    path.projectID:
      in: path
      name: project-id
      schema:
        type: string
      required: true
      description: "Project ID"
    path.moduleCategoryID:
      in: path
      name: module-category-id
      schema:
        type: string
      required: true
      description: "Module Category ID"
    path.moduleID:
      in: path
      name: module-id
      schema:
        type: string
      required: true
      description: "Module ID"
    path.applicationID:
      in: path
      name: application-id
      schema:
        type: string
      required: true
      description: "Application ID"
    path.instanceID:
      in: path
      name: instance-id
      schema:
        type: string
      required: true
      description: "Instance ID"
    query.limit:
      in: query
      name: limit
      schema:
        type: integer
        minimum: -1
        default: 100
      required: false
      description: "-1表示全部顯示"
    query.offset:
      in: query
      name: offset
      schema:
        type: integer
        minimum: 0
        default: 0
      required: false
      description: "從第幾筆開始取得"
    header.xLanguage:
      in: header
      name: X-Language
      schema:
        $ref: '#/components/schemas/enum.language'
      required: false
      description: "指定回應語言"

##
#
# Schemas
##
  schemas:
    enum.language:
      type: string
      enum:
        - "zh-TW"
        - "en-US"
      default: "zh-TW"

    moduleCategory:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        creator:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            account:
              type: string
        createdAt:
          type: string
          format: date-time
          description: UTC Time (RFC3339)
        updatedAt:
          type: string
          format: date-time
          description: UTC Time (RFC3339)

    listModuleCategoriesOutput:
      type: object
      properties:
        moduleCategories:
          type: array
          items:
            allOf:
            - $ref: '#/components/schemas/moduleCategory'
            - type: object
              properties:
                moduleCount:
                  type: integer
        total:
          type: integer

    getModuleCategoryOutput:
      $ref: '#/components/schemas/moduleCategory'

    createModuleCategoryInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        creatorId:
          type: string
          format: uuid

    createModuleCategoryOutput:
      $ref: '#/components/schemas/moduleCategory'

    updateModuleCategoryInput:
      type: object
      properties:
        description:
          type: string

    updateModuleCategoryOutput:
      $ref: '#/components/schemas/moduleCategory'

    module:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        state:
          type: string
        questions:
          type: object
          # dynamic properties
        moduleCategory:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
        creator:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            account:
              type: string
        createdAt:
          type: string
          format: date-time
          description: UTC Time (RFC3339)
        updatedAt:
          type: string
          format: date-time
          description: UTC Time (RFC3339)

    listModulesOutput:
      type: object
      properties:
        modules:
          type: array
          items:
            $ref: '#/components/schemas/module'
        total:
          type: integer

    getModuleOutput:
      $ref: '#/components/schemas/module'

    module.admin:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        state:
          type: string
        questions:
          type: object
          # dynamic properties
        location:
          type: string
        public:
          type: boolean
        moduleCategory:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
        creator:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            account:
              type: string
        createdAt:
          type: string
          format: date-time
          description: UTC Time (RFC3339)
        updatedAt:
          type: string
          format: date-time
          description: UTC Time (RFC3339)

    listModulesOutput.admin:
      type: object
      properties:
        modules:
          type: array
          items:
            $ref: '#/components/schemas/module.admin'
        total:
          type: integer

    getModuleOutput.admin:
      $ref: '#/components/schemas/module.admin'

    updateModuleInput.admin:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        public:
          type: boolean
    
    updateModuleOutput.admin:
      $ref: '#/components/schemas/module.admin'

    createModuleInput.admin:
      type: object
