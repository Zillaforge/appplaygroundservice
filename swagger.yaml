        '500':
          $ref: '#/components/responses/500'

  '/project/{project-id}/instance/{instance-id}/floatingip/associate':
    post:
      summary: 指派 Floating Ip ID 給指定的 Instance
      security:
        - bearerAuth: []
      tags:
        - "User/Instance"
      parameters:
        - $ref: '#/components/parameters/path.projectID'
        - $ref: '#/components/parameters/path.instanceID'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/associateFloatingIpInput'
            examples:
              associateFloatingIpInput:
                $ref: '#/components/examples/associateFloatingIpInput'
      responses:
        '200':
          description: "OK"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/associateFloatingIpOutput'
              examples:
                associateFloatingIpOutput:
                  $ref: '#/components/examples/associateFloatingIpOutput'
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
    delete:
      summary: 將已指派給指定 Instance 的 Floating Ip ID 回收
      security:
        - bearerAuth: []
      tags:
        - "User/Instance"
      parameters:
        - $ref: '#/components/parameters/path.projectID'
        - $ref: '#/components/parameters/path.instanceID'
      responses:
        '200':
          description: "OK"
          content:
            application/json:
