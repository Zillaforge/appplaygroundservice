openapi: 3.0.0
info:
  title: App Playground Service RESTful API
  description: ASUS Enterprise App Playground Service 以 Portal 需求列出其需要的 Restful API Response 以 Json 格式呈現
  version: 1.0.0
  termsOfService: "http://0.0.0.0:8111"
  contact:
    email: "ocis_admin@asus.com"
  license:
    name: "Apache 2.0"
    url: "http://www.apache.org/licenses/LICENSE-2.0.html"
servers:
  - url: http://127.0.0.1:8111/aps/api/v1/
    description: local develop environment
tags:
  - name: "User/ModuleCategory"
    description: "ModuleCategory RESTful APIs"
  - name: "User/Module"
    description: "Module RESTful APIs"
  - name: "User/Application"
    description: "Application RESTful APIs"
  - name: "User/Instance"
    description: "Instance RESTful APIs"
  - name: "Admin/ModuleCategory"
    description: "ModuleCategory RESTful APIs"
  - name: "Admin/Module"
    description: "Module RESTful APIs"
  - name: "Admin/ModuleACL"
    description: "ModuleACL RESTful APIs"
  - name: "Admin/Application"
    description: "Application RESTful APIs"
  - name: "Admin/Instance"
    description: "Instance RESTful APIs"

paths:
##
#
#   User RESTful API
#
##
## Module Category API
  '/project/{project-id}/module-categories':
    get:
      summary: 列出所有的 Module Categories
      security:
        - bearerAuth: []
      tags:
        - "User/ModuleCategory"
      parameters:
        - $ref: '#/components/parameters/path.projectID'
        - $ref: '#/components/parameters/query.limit'
        - $ref: '#/components/parameters/query.offset'
      responses:
        '200':
          description: "OK"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listModuleCategoriesOutput'
              examples:
                listModuleCategoriesOutput:
                  $ref: '#/components/examples/listModuleCategoriesOutput'
        '403':
          $ref: '#/components/responses/403'
        '500':
          $ref: '#/components/responses/500'

  '/project/{project-id}/module-category/{module-category-id}':
    get:
      summary: 取得指定的 Module Category
      security:
        - bearerAuth: []
      tags:
        - "User/ModuleCategory"
      parameters:
        - $ref: '#/components/parameters/path.projectID'
        - $ref: '#/components/parameters/path.moduleCategoryID'
      responses:
        '200':
          description: "OK"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getModuleCategoryOutput'
              examples:
                getModuleCategoryOutput:
                  $ref: '#/components/examples/getModuleCategoryOutput'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'

## Module API
  '/project/{project-id}/module-category/{module-category-id}/modules':
    get:
      summary: 列出指定 ModuleCategory 下所有的 Modules
      security:
        - bearerAuth: []
      tags:
        - "User/Module"
      parameters:
        - $ref: '#/components/parameters/path.projectID'
        - $ref: '#/components/parameters/path.moduleCategoryID'
        - $ref: '#/components/parameters/query.limit'
        - $ref: '#/components/parameters/query.offset'
        - $ref: '#/components/parameters/header.xLanguage'
      responses:
        '200':
          description: "OK"
          headers:
            Content-Language:
              schema:
                $ref: '#/components/schemas/enum.language'
              description: "語言"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listModulesOutput'
              examples:
                listModulesOutput:
                  $ref: '#/components/examples/listModulesOutput'
        '403':
          $ref: '#/components/responses/403'
        '500':
          $ref: '#/components/responses/500'

  '/project/{project-id}/module/{module-id}':
    get:
      summary: 取得指定的 Module
      security:
        - bearerAuth: []
      tags:
        - "User/Module"
      parameters:
        - $ref: '#/components/parameters/path.projectID'
        - $ref: '#/components/parameters/path.moduleID'
        - $ref: '#/components/parameters/header.xLanguage'
      responses:
        '200':
          description: "OK"
          headers:
            Content-Language:
              schema:
                $ref: '#/components/schemas/enum.language'
              description: "語言"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getModuleOutput'
              examples:
                getModuleOutput:
                  $ref: '#/components/examples/getModuleOutput'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'

## Application API
  '/project/{project-id}/applications':
    get:
      summary: 列出所有的 Applications
      security:
        - bearerAuth: []
      tags:
        - "User/Application"
      parameters:
        - $ref: '#/components/parameters/path.projectID'
        - $ref: '#/components/parameters/query.limit'
        - $ref: '#/components/parameters/query.offset'
        - in: query
          name: where
          schema:
            type: array
            items:
              type: string
          description: |
            此功能可以帶入欄位及值作為查詢條件，來篩選出滿足條件的清單。支援的欄位：state
      responses:
        '200':
          description: "OK"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listApplicationsOutput'
              examples:
                listApplicationsOutput:
                  $ref: '#/components/examples/listApplicationsOutput'
        '403':
          $ref: '#/components/responses/403'
        '500':
          $ref: '#/components/responses/500'

  '/project/{project-id}/application/{application-id}':
    get:
      summary: 取得指定的 Application
      security:
        - bearerAuth: []
      tags:
        - "User/Application"
      parameters:
        - $ref: '#/components/parameters/path.projectID'
        - $ref: '#/components/parameters/path.applicationID'
      responses:
        '200':
          description: "OK"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getApplicationOutput'
              examples:
                getApplicationOutput:
                  $ref: '#/components/examples/getApplicationOutput'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'

    delete:
      summary: 刪除指定的 Application
      security:
        - bearerAuth: []
      tags:
      - "User/Application"
      parameters:
        - $ref: '#/components/parameters/path.projectID'
        - $ref: '#/components/parameters/path.applicationID'
      responses:
        '204':
          $ref: '#/components/responses/204'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'

  '/project/{project-id}/application':
    post:
      summary: 創建 Application
      security:
        - bearerAuth: []
      tags:
        - "User/Application"
      parameters:
        - $ref: '#/components/parameters/path.projectID'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/createApplicationInput'
            examples:
              createApplicationInput:
                $ref: '#/components/examples/createApplicationInput'
      responses:
        '201':
          description: "Created"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/createApplicationOutput'
              examples:
                createApplicationOutput:
                  $ref: '#/components/examples/createApplicationOutput'
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '500':
          $ref: '#/components/responses/500'

  '/project/{project-id}/application/{application-id}/approve':
    post:
      summary: 核准指定的 Application
      description: |
        此功能會將 Application 的狀態從 Review 改為 Processing，只有 Tenant Admin 可以使用此功能
      security:
        - bearerAuth: []
      tags:
        - "User/Application"
      parameters:
        - $ref: '#/components/parameters/path.projectID'
        - $ref: '#/components/parameters/path.applicationID'
      responses:
        '200':
          description: "OK"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/approveApplicationOutput'
              examples:
                approveApplicationOutput:
                  $ref: '#/components/examples/approveApplicationOutput'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'

  '/project/{project-id}/application/{application-id}/reject':
    post:
      summary: 拒絕指定的 Application
      description: |
        此功能會將 Application 的狀態從 Review 改為 Reject Tenant Admin 可以使用此功能
      security:
        - bearerAuth: []
      tags:
        - "User/Application"
      parameters:
        - $ref: '#/components/parameters/path.projectID'
        - $ref: '#/components/parameters/path.applicationID'
      responses:
        '200':
          description: "OK"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/rejectApplicationOutput'
              examples:
                rejectApplicationOutput:
                  $ref: '#/components/examples/rejectApplicationOutput'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'

  '/project/{project-id}/application/{application-id}/logs':
