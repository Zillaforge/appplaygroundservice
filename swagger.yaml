## ModuleACL Admin API
  '/admin/module/{module-id}/acl':
    get:
      summary: 取得指定的 Module ACL
      description: |
        此功能會取得指定 Module 的存取控制資訊。若 Module 非公開時，列出哪些 Project 可以使用此 Module。
      security:
        - bearerAuth: []
      tags:
        - "Admin/ModuleACL"
      parameters:
        - $ref: '#/components/parameters/path.moduleID'
      responses:
        '200':
          description: "OK"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getModuleACLOutput.admin'
              examples:
                getModuleACLOutput:
                  $ref: '#/components/examples/getModuleACLOutput.admin'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
    put:
      summary: 更新特定的 Module ACL
      description: |
