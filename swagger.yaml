        name:
          type: string
        description:
          type: string
        location:
          type: string
        moduleCategoryId:
          type: string
          format: uuid
        creatorId:
          type: string
          format: uuid

    createModuleOutput.admin:
      $ref: '#/components/schemas/module.admin'

    getModuleACLOutput.admin:
