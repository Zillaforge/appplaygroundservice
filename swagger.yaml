          type: array
          items:
            type: string

    updateModuleACLInput.admin:
      type: object
      properties:
        projectIDs:
          type: array
          items:
            type: string

    updateModuleACLOutput.admin:
      type: object
      properties:
        moduleID:
          type: string
          format: uuid
        projectIDs:
          type: array
          items:
            type: string

    application:
