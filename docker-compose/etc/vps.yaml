memcache:
  ttl: 60
gpu_models:
  passthrough:
  - "gtx1080ti"
  vgpu:
  - "T4_VGPU"
  - "H100_VGPU"
default_quotas:
  vm: 20
  vcpu: 100
  ram: 102400 # in MiB
  gpu: 5
  block_size: 1024 # in GiB
  network: 10
  router: -1
  floating_ip: 10
  loadbalancer: -1
  share: -1
  share_size: 1024 # in GiB
littlebell: # notification service
  enable: false
  host: http://pegasus-cloud-snsserver:8092
  region: default
  credential:
    project_id: 14735dfa-5553-46cc-b4bd-405e711b223f
    user_id: 4990ccdb-a9b1-49e5-91df-67c921601d81
  arn: "arn:aws:sns:default:14735dfa-5553-46cc-b4bd-405e711b223f:lbm-svc-event-publish-topic"
metering:
