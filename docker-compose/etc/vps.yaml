  amqp:
    account: guest
    password: guest
    host: pegasus-cloud-rabbitmq:5672
    manage_host: pegasus-cloud-rabbitmq:15672
    exchange: mts
    timeout: 5
    rpc_timeout: 10
    vhost: "/"
    operation_connection_num: 2
    channel_num: 1
    replica_num: 0
    consumer_connection_num: 1
