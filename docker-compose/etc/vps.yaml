version: 0.3.3
kind: VirtualPlatformService
virtualplatformservice:
  instance: VirtualPlatformService
  developer: true
  # http:
    # host: 0.0.0.0:8106
    # access_control:
      # allow_origins: ["*"]
      # allow_credentials: true
      # allow_headers: ["Origin", "Content-Length", "Content-Type", "Authorization"]
      # allow_methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "HEAD", "OPTIONS"]
      # expose_headers: ["host-id", "version-id", "location-id"]
  grpc:
    host: 0.0.0.0:5106
    unix_socket: 
      path: /run/VirtualPlatformService.sock
      conn_count: 20
    write_buffer_size: 32768
    read_buffer_size: 32768
    max_receive_message_size: 4194304
    max_send_message_size: 2147483647
  logger:
    system_log:
      path: log/
      # max_size: 10
      # max_backups: 5
      # max_age: 10
      # compress: false
      mode: debug
      show_in_console: true
    access_log:
      path: log/
      # max_size: 10
      # max_backups: 5
      # max_age: 10
      # compress: false
      # default_source_ip: 196.254.1.0
    event_consume_log:
      path: log/
      # max_size: 10
      # max_backups: 5
      # max_age: 10
      # compress: false
  # tls:
  #   enable: false
  #   cert_path: tls/hcs/pegasus-hcs.pem
  #   key_path: tls/hcs/pegasus-hcs-key.pem
  tracer:
    enable: false
    host: http://pegasus-cloud-jaeger:14268/api/traces
    timeout: 10
storage:
  provider: mariadb
  mariadb:
    host: pegasus-cloud-mariadb:3306
    account: root
    password: password
    name: vps_trust
    # timeout: 5
    # max_open_conns: 150
    # conn_max_lifetime: 10
    # max_idle_conns: 150
authentication:
  service: myiam
event_consume:
  # service 輸入指定的 Service Name 或 empty(不啟動) 
  service: my_redis_sentinel
  channels:
  - FromIAM
services:
  - name: myiam
    kind: iam
    hosts: 
      - pegasus-cloud-iamserver-release:5051
    tls:
      enable: false
      cert_path: /root/server-csr/IAM.pem
    connection_per_host: 3
  - name: my_redis_sentinel
    kind: redis_sentinel
    hosts:
    - pegasus-cloud-redis-sentinel:26379
    password: password
    sentinel_password: password
    master_group_name: mymaster
vrm:
  host: vrm-server-release:5109
  tls:
    enable: false
    cert_path: /root/server-csr/IAM.pem
openstack:
  auth_url: REPLACE_KEYSTONE_ENDPOINT
  domain: "trustedcloud"
  admin_project: "trustedcloud"
  admin: "test@trusted-cloud.nchc.org.tw"
  admin_pwd: "password123"
  ldap_enabled: true
  # pwd_method: "reverse" # ["reverse", "otp"]
  pwd_method: "otp" # ["reverse", "otp"]
  pwd_otp_secret: "pwd_otp_secret"
  network:
    cidr_blacklist: []
  micro_version:
    nova: "2.91" # since 2.92, nova API not allow to generate keypair
    cinder: "3.71"
    manila: "2.63"
  project_name_iam_mapping: "ID"
  default_nova_az: "default"
  gnocchi_granularity: 300
  gnocchi_granularity_cpu_alarm: 60
  enable_snapshot_actual_size: true
  enable_gpu_quota: true
  manila:
    enabled: false
    share_type: "default_share_type"
  vgpu_monitor:
    enabled: false
    prometheus_addr: "http://10.78.26.148:9090"
  # 如果opsk沒有該role, panic
  roles:
    - "admin"
    - "member"
    # - "load-balancer_member"
    # - "creator"
    # - "key-manager:service-admin"
  timeout: # seconds
    connection: 5 
    vol_create_with_server: 10
  system_volume_type: "SSD"
  volume_type_whitelist: ["SSD"]
opsk_role_mapping:
  TENANT_ADMIN:
  - "member"
  - "load-balancer_member"
  - "creator"
  TENANT_MEMBER:
  - "member"
  - "load-balancer_member"
  - "creator"
  vps_adm: # ${.openstack.admin)在每個project的role
  - "admin"
  - "key-manager:service-admin"
namespace:
  all:
    - name: "public"
      nameservers: ["172.22.44.53"]
    - name: "private"
      nameservers: ["172.22.44.54"]
  default: "public"
network_bonding_mode: true
job_sync_interval:
  iam: 300
  compute: 10
  net: 10
  block: 10
  lb: 10
  quota: 60
scheduler_duration: # every X hours, 0<X<=24 && 24%X==0
  gc: 2
  metering: 4
available_district: "tw-tc-ad1"
vm_customize:
  yum_repo_rocky: "https://free.nchc.org.tw/rocky" # special characters: only support ['.','/']
  apt_repo: "https://free.nchc.org.tw/ubuntu"
  ntp_servers:
    - "clock.nchc.org.tw"
  timezone: "Asia/Taipei"
  vgpu_license_token: # by namespace
