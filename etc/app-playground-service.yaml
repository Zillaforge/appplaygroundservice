version: 0.0.6
kind: AppPlaygroundService
app_playground_service:
  instance: AppPlaygroundService
  developer: true
  http:
    host: 0.0.0.0:8111
    access_control:
      allow_origins: ["*"]
      allow_credentials: true
      allow_headers: ["X-Language", "Origin", "Content-Length", "Content-Type", "Authorization"]
      allow_methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "HEAD", "OPTIONS"]
      expose_headers: ["Content-Language", "host-id", "version-id", "location-id"]
  grpc:
    host: 0.0.0.0:5111
    unix_socket: 
      path: /run/AppPlaygroundService.sock
      conn_count: 20
    write_buffer_size: 32768
    read_buffer_size: 32768
    max_receive_message_size: 4194304
    max_send_message_size: 2147483647
  logger:
    system_log:
      path: log/
      # max_size: 10
      # max_backups: 5
      # max_age: 10
      # compress: false
      mode: debug
      show_in_console: true
    access_log:
      path: log/
      # max_size: 10
      # max_backups: 5
      # max_age: 10
      # compress: false
      # default_source_ip: 196.254.1.0
    event_consume_log:
      path: log/
      # max_size: 10
      # max_backups: 5
      # max_age: 10
      # compress: false
  # tls:
  #   enable: false
  #   cert_path: tls/hcs/pegasus-hcs.pem
  #   key_path: tls/hcs/pegasus-hcs-key.pem
  tracer:
    enable: true
    host: http://pegasus-cloud-jaeger:14268/api/traces
    timeout: 10
  scopes:
    allow_namespaces: ["public", "private"]
    default_language: zh-TW
    enable_resource_review: true
  data_path:
    # ModulePath: /<data_dir>/<module_pid>/aps/module/<module-id>
    # ApplicationPath: /<data_dir>/<project-id>/aps/application/<application-id>
    data_dir: /home/appplaygroundservice/tmp/data
    module_pid: 14735dfa-5553-46cc-b4bd-405e711b223f
  application:
    provider: terraform
    summary_log_length: -1
    terraform:
      bin_path: "/usr/bin/terraform"
  opstkidentity:
    pid_source: extra.tw-tc-ad1.opsk.uuid
    uid_source: extra.tw-tc-ad1.opsk.uuid
storage:
  provider: mariadb
  mariadb:
    host: pegasus-cloud-mariadb:3306
    account: root
    password: password
    name: aps
    timeout: 5
    max_open_conns: 150
    conn_max_lifetime: 10
    max_idle_conns: 150
authentication:
  service: myiam
openstack:
  - namespace: public
    service: opstk
  - namespace: private
    service: opstk
openstack_resource:
  service: myvps
services:
  - name: myiam
    kind: iam
    hosts: 
      - pegasus-cloud-iamserver:5051
    tls:
      enable: false
      cert_path: /root/server-csr/IAM.pem
    connection_per_host: 3
  - name: opstk
    kind: openstack
    identity_endpoint: http://10.78.19.155:5000/v3
    admin_username: opstk-system@trusted-cloud.nchc.org.tw
    admin_password: password
    admin_project: 14735dfa-5553-46cc-b4bd-405e711b223f
    domain_name: trustedcloud
    allow_reauth: true
    pid_source: extra.tw-tc-ad1.opsk.uuid # example: id, extra.tw-tc-ad1.opsk.uuid
    username_source: account
    pwd_otp_secret: pwd_otp_secret
  - name: myvps
    kind: vps
    hosts: 
    # - pegasus-cloud-vpsserver:5106
    - 10.78.19.100:35110
    tls:
      enable: false
      cert_path: /root/server-csr/VPS.pem

event_publish:
  plugins:
  # - name: event_publish
  #   type: grpc
  #   binary_path: /var/lib/ASUS/EventPublishPlugin/eventpublishplugin
  #   config_path: /var/lib/ASUS/EventPublishPlugin/eventpublishplugin.yaml
  #   socket_path: /run/eventpublishplugin.sock
  #   start_cmd_args:
  #     --redis-channel: FromAPS
metering_service:
  account: guest
  password: guest
  host: pegasus-cloud-rabbitmq:5672
  manage_host: pegasus-cloud-rabbitmq:15672
  timeout: 5
  rpc_timeout: 10
  vhost: "/"
  operation_connection_num: 2
  channel_num: 1
  replica_num: 0
  consumer_connection_num: 1
littlebell:
  host: http://pegasus-cloud-snsserver:8092
  region: default
  credential:
    project_id: 14735dfa-5553-46cc-b4bd-405e711b223f
    user_id: 4990ccdb-a9b1-49e5-91df-67c921601d81
  arn: arn:aws:sns:default:14735dfa-5553-46cc-b4bd-405e711b223f:lbm-svc-event-publish-topic